<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoFeed — Daily Crypto News</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #f7931a;
    --accent2: #627eea;
    --accent3: #26a17b;
    --text: #e8e8f0;
    --muted: #888899;
    --glow: rgba(247,147,26,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(247,147,26,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(247,147,26,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 24px var(--glow);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 24px var(--glow); }
    50% { box-shadow: 0 0 48px rgba(247,147,26,0.35); }
  }

  .logo h1 {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo h1 span { color: var(--accent); }

  .tagline {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(247,147,26,0.1);
    border: 1px solid rgba(247,147,26,0.3);
    border-radius: 20px;
    padding: 8px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--accent);
  }

  .live-dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: blink 1.2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* Coin filter pills */
  .filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .pill {
    padding: 8px 18px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .pill:hover, .pill.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(247,147,26,0.08);
  }

  .pill.active { font-weight: 700; }

  .pill-emoji { font-size: 14px; }

  /* Fetch button */
  .fetch-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--accent), #e8820a);
    border: none;
    border-radius: 14px;
    color: #000;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  .fetch-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.15));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .fetch-btn:hover::before { opacity: 1; }
  .fetch-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(247,147,26,0.4); }
  .fetch-btn:active { transform: translateY(0); }
  .fetch-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* Loading state */
  .loading {
    text-align: center;
    padding: 60px 20px;
    display: none;
  }

  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    font-size: 0.8rem;
    animation: fadeText 2s ease-in-out infinite;
  }

  @keyframes fadeText {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* News cards */
  .news-grid { display: flex; flex-direction: column; gap: 16px; }

  .news-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    transition: all 0.25s;
    animation: slideUp 0.4s ease both;
    position: relative;
    overflow: hidden;
  }

  .news-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .news-card:hover {
    border-color: rgba(247,147,26,0.35);
    transform: translateX(4px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  .news-card:hover::before { opacity: 1; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 12px;
  }

  .card-title {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.4;
    color: var(--text);
    flex: 1;
  }

  .coin-tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .tag-btc { background: rgba(247,147,26,0.15); color: var(--accent); border: 1px solid rgba(247,147,26,0.3); }
  .tag-eth { background: rgba(98,126,234,0.15); color: var(--accent2); border: 1px solid rgba(98,126,234,0.3); }
  .tag-alt { background: rgba(38,161,123,0.15); color: var(--accent3); border: 1px solid rgba(38,161,123,0.3); }
  .tag-market { background: rgba(180,120,255,0.15); color: #b478ff; border: 1px solid rgba(180,120,255,0.3); }

  .card-summary {
    color: var(--muted);
    font-size: 0.88rem;
    line-height: 1.6;
    margin-bottom: 14px;
  }

  .card-footer {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .sentiment {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 700;
  }

  .sent-bull { background: rgba(38,161,123,0.15); color: var(--accent3); }
  .sent-bear { background: rgba(255,80,80,0.12); color: #ff5555; }
  .sent-neutral { background: rgba(136,136,153,0.15); color: var(--muted); }

  .impact {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
  }

  /* Summary box */
  .summary-box {
    background: linear-gradient(135deg, rgba(247,147,26,0.06), rgba(98,126,234,0.06));
    border: 1px solid rgba(247,147,26,0.2);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 28px;
    display: none;
  }

  .summary-box h3 {
    font-size: 0.75rem;
    font-family: 'Space Mono', monospace;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .summary-box p {
    color: var(--text);
    font-size: 0.92rem;
    line-height: 1.7;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 56px; margin-bottom: 20px; }
  .empty-state h3 { font-size: 1.2rem; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 0.85rem; font-family: 'Space Mono', monospace; }

  /* Timestamp */
  .timestamp {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-align: center;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    opacity: 0.6;
  }

  .error-box {
    background: rgba(255,80,80,0.08);
    border: 1px solid rgba(255,80,80,0.25);
    border-radius: 12px;
    padding: 20px;
    color: #ff6b6b;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    text-align: center;
    display: none;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <div class="logo-icon">₿</div>
      <div>
        <h1>Crypto<span>Feed</span></h1>
        <div class="tagline">Daily Market Intelligence</div>
      </div>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>
      AI POWERED
    </div>
  </header>

  <!-- Coin Filters -->
  <div class="filters">
    <div class="pill active" data-filter="all" onclick="setFilter(this, 'all')">
      <span class="pill-emoji">🌐</span> All Crypto
    </div>
    <div class="pill" data-filter="bitcoin" onclick="setFilter(this, 'bitcoin')">
      <span class="pill-emoji">₿</span> Bitcoin
    </div>
    <div class="pill" data-filter="ethereum" onclick="setFilter(this, 'ethereum')">
      <span class="pill-emoji">⟠</span> Ethereum
    </div>
    <div class="pill" data-filter="altcoins" onclick="setFilter(this, 'altcoins')">
      <span class="pill-emoji">🚀</span> Altcoins
    </div>
    <div class="pill" data-filter="defi" onclick="setFilter(this, 'defi')">
      <span class="pill-emoji">⚡</span> DeFi
    </div>
  </div>

  <button class="fetch-btn" onclick="fetchNews()" id="fetchBtn">
    <span>⚡</span> GET TODAY'S CRYPTO NEWS
  </button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Scanning blockchain news...</div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="summary-box" id="summaryBox">
    <h3>📊 Today's Market Summary</h3>
    <p id="summaryText"></p>
  </div>

  <div class="news-grid" id="newsGrid">
    <div class="empty-state">
      <div class="empty-icon">📡</div>
      <h3>Ready to fetch today's news</h3>
      <p>Press the button above to get live crypto updates</p>
    </div>
  </div>

  <div class="timestamp" id="timestamp"></div>

</div>

<script>
let currentFilter = 'all';
let allArticles = [];

const loadingTexts = [
  "Scanning blockchain news...",
  "Checking Bitcoin mempool...",
  "Analyzing market sentiment...",
  "Fetching altcoin updates...",
  "Processing on-chain data..."
];

function setFilter(el, filter) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  currentFilter = filter;
  if (allArticles.length > 0) renderCards(allArticles);
}

function getCoinTag(coin) {
  const map = {
    'BTC': ['tag-btc', 'BTC'],
    'ETH': ['tag-eth', 'ETH'],
    'ALT': ['tag-alt', 'ALTCOIN'],
    'MARKET': ['tag-market', 'MARKET'],
    'DEFI': ['tag-alt', 'DeFi'],
  };
  return map[coin] || ['tag-market', coin];
}

function getSentimentClass(sentiment) {
  if (!sentiment) return 'sent-neutral';
  const s = sentiment.toLowerCase();
  if (s.includes('bull') || s.includes('positive')) return 'sent-bull';
  if (s.includes('bear') || s.includes('negative')) return 'sent-bear';
  return 'sent-neutral';
}

function renderCards(articles) {
  const grid = document.getElementById('newsGrid');

  const filtered = articles.filter(a => {
    if (currentFilter === 'all') return true;
    const coin = (a.coin || '').toLowerCase();
    const title = (a.title || '').toLowerCase();
    const summary = (a.summary || '').toLowerCase();
    if (currentFilter === 'bitcoin') return coin === 'btc' || title.includes('bitcoin') || summary.includes('bitcoin');
    if (currentFilter === 'ethereum') return coin === 'eth' || title.includes('ethereum') || summary.includes('ethereum');
    if (currentFilter === 'altcoins') return coin === 'alt' || (!title.includes('bitcoin') && !title.includes('ethereum'));
    if (currentFilter === 'defi') return coin === 'defi' || title.includes('defi') || summary.includes('defi');
    return true;
  });

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🔍</div>
      <h3>No ${currentFilter} news found</h3>
      <p>Try a different filter or refresh</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map((article, i) => {
    const [tagClass, tagLabel] = getCoinTag(article.coin || 'MARKET');
    const sentClass = getSentimentClass(article.sentiment);
    return `
    <div class="news-card" style="animation-delay: ${i * 0.07}s">
      <div class="card-header">
        <div class="card-title">${article.title}</div>
        <span class="coin-tag ${tagClass}">${tagLabel}</span>
      </div>
      <div class="card-summary">${article.summary}</div>
      <div class="card-footer">
        <span class="sentiment ${sentClass}">${article.sentiment || 'NEUTRAL'}</span>
        ${article.impact ? `<span class="impact">Impact: ${article.impact}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function fetchNews() {
  const btn = document.getElementById('fetchBtn');
  const loading = document.getElementById('loading');
  const errorBox = document.getElementById('errorBox');
  const summaryBox = document.getElementById('summaryBox');
  const grid = document.getElementById('newsGrid');

  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span> FETCHING...';
  loading.style.display = 'block';
  errorBox.style.display = 'none';
  summaryBox.style.display = 'none';
  grid.innerHTML = '';

  // Cycle loading texts
  let textIdx = 0;
  const textInterval = setInterval(() => {
    textIdx = (textIdx + 1) % loadingTexts.length;
    document.getElementById('loadingText').textContent = loadingTexts[textIdx];
  }, 1500);

  const today = new Date().toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  const prompt = `You are a crypto news analyst. Today is ${today}. Search and provide the latest 8-10 cryptocurrency news stories from today or the past 24 hours. Include news about Bitcoin, Ethereum, and major altcoins (Solana, XRP, BNB, etc.).

Return ONLY a valid JSON object with this exact structure:
{
  "summary": "2-3 sentence overall market summary for today",
  "articles": [
    {
      "title": "News headline",
      "summary": "2-3 sentence summary of the news",
      "coin": "BTC or ETH or ALT or DEFI or MARKET",
      "sentiment": "BULLISH or BEARISH or NEUTRAL",
      "impact": "HIGH or MEDIUM or LOW"
    }
  ]
}

Focus on real, impactful news. No markdown, no explanation, ONLY the JSON.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    clearInterval(textInterval);

    // Extract text from content blocks
    let rawText = '';
    for (const block of data.content || []) {
      if (block.type === 'text') rawText += block.text;
    }

    // Parse JSON from response
    const jsonMatch = rawText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('Could not parse news data');

    const parsed = JSON.parse(jsonMatch[0]);
    allArticles = parsed.articles || [];

    // Show summary
    if (parsed.summary) {
      document.getElementById('summaryText').textContent = parsed.summary;
      summaryBox.style.display = 'block';
    }

    renderCards(allArticles);

    // Timestamp
    document.getElementById('timestamp').textContent =
      `Last updated: ${new Date().toLocaleTimeString('en-IN')} IST • ${today}`;

  } catch (err) {
    clearInterval(textInterval);
    errorBox.textContent = `⚠️ Failed to fetch news: ${err.message}. Please try again.`;
    errorBox.style.display = 'block';
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">😔</div>
      <h3>Something went wrong</h3>
      <p>Check console for details</p>
    </div>`;
    console.error(err);
  } finally {
    loading.style.display = 'none';
    btn.disabled = false;
    btn.innerHTML = '<span>🔄</span> REFRESH NEWS';
  }
}
</script>
</body>
</html>
